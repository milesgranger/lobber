name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: lobber

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev
      - name: Run tests
        run: cargo test --verbose

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine binary path
        id: bin
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "path=target/${{ matrix.target }}/release/${BINARY_NAME}.exe" >> "$GITHUB_OUTPUT"
            echo "name=${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}.zip" >> "$GITHUB_OUTPUT"
          else
            echo "path=target/${{ matrix.target }}/release/${BINARY_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          staging="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "${{ steps.bin.outputs.path }}" "$staging/"
          cp README.md "$staging/" 2>/dev/null || true
          cp LICENSE* "$staging/" 2>/dev/null || true
          tar czf "${{ steps.bin.outputs.name }}" "$staging"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          staging="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "${{ steps.bin.outputs.path }}" "$staging/"
          cp README.md "$staging/" 2>/dev/null || true
          cp LICENSE* "$staging/" 2>/dev/null || true
          7z a "${{ steps.bin.outputs.name }}" "$staging"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.bin.outputs.name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
